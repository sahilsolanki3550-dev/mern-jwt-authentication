<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#F8FAFC"/>

  <!-- Token Ring -->
  <circle
    cx="64"
    cy="52"
    r="34"
    fill="none"
    stroke="url(#bg)"
    stroke-width="8"
    stroke-dasharray="8 4"
  />

  <!-- Lock Shackle -->
  <path
    d="M54 50V44C54 38 58 34 64 34C70 34 74 38 74 44V50"
    fill="none"
    stroke="#0F172A"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Lock Body -->
  <rect
    x="50"
    y="50"
    width="28"
    height="20"
    rx="4"
    fill="url(#bg)"
  />

  <!-- Lock Keyhole -->
  <circle cx="64" cy="59" r="2.5" fill="#FFFFFF"/>
  <rect x="63" y="61" width="2" height="5" fill="#FFFFFF"/>
</svg>