<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="100" y1="100" x2="412" y2="412">
      <stop offset="0%" stop-color="#9EFFA5"/>
      <stop offset="100%" stop-color="#28E6C5"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="180" y1="250" x2="340" y2="250">
      <stop offset="0%" stop-color="#8AFF66"/>
      <stop offset="100%" stop-color="#28E6C5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="250" fill="#041126"/>

  <!-- Orbit Ring -->
  <ellipse
    cx="256"
    cy="256"
    rx="220"
    ry="90"
    stroke="url(#shieldGradient)"
    stroke-width="8"
    fill="none"
    transform="rotate(-15 256 256)"
  />

  <!-- Shield -->
  <path
    d="M256 80
       L390 130
       V250
       C390 350 330 420 256 460
       C182 420 122 350 122 250
       V130
       L256 80Z"
    fill="#081A2F"
    stroke="url(#shieldGradient)"
    stroke-width="10"
  />

  <!-- Lock -->
  <g transform="translate(0,-10)">
    <rect x="206" y="180" width="100" height="90" rx="18" fill="white"/>

    <path
      d="M226 180
         V150
         C226 115 286 115 286 150
         V180"
      stroke="white"
      stroke-width="16"
      fill="none"
      stroke-linecap="round"
    />

    <circle cx="256" cy="220" r="10" fill="#081A2F"/>
    <rect x="252" y="220" width="8" height="22" fill="#081A2F"/>
  </g>

  <!-- JWT Text -->
  <text
    x="256"
    y="340"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="72"
    font-weight="700"
    fill="url(#textGradient)"
  >
    JWT
  </text>

  <!-- AUTH Text -->
  <text
    x="256"
    y="395"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="38"
    letter-spacing="6"
    fill="#FFFFFF"
  >
    AUTH
  </text>
</svg>